name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Generate version
        id: version
        run: |
          VERSION="Salute-v1.0.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          mkdir release

          PAPER_JAR=$(find salute-paper/build/libs -name "*.jar" | head -n 1)
          VELOCITY_JAR=$(find salute-velocity/build/libs -name "*.jar" | head -n 1)

          cp "$PAPER_JAR" "release/${{ steps.version.outputs.version }}-paper.jar"
          cp "$VELOCITY_JAR" "release/${{ steps.version.outputs.version }}-velocity.jar"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.jar
